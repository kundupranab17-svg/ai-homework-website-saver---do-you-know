<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenius AI</title>

<style>
body{margin:0;font-family:system-ui;display:flex;height:100vh;background:#181818;color:white;}
.sidebar{width:260px;background:#202123;padding:10px;display:flex;flex-direction:column;}
.btn{padding:10px;border-radius:8px;cursor:pointer;}
.btn:hover{background:#2a2b32;}
.yourChats{display:flex;justify-content:space-between;margin-top:10px;cursor:pointer;font-size:13px;color:#aaa;}
.chatItem{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:6px;}
.chatItem:hover{background:#2a2b32;}
.left{display:flex;gap:6px;align-items:center;}
.dot{width:6px;height:6px;background:white;border-radius:50%;}
.main{flex:1;display:flex;flex-direction:column;}
.topbar{height:50px;display:flex;justify-content:space-between;align-items:center;padding:0 15px;border-bottom:1px solid #333;}
.chat{flex:1;padding:20px;overflow-y:auto;}
.message{max-width:70%;padding:10px;border-radius:10px;margin:10px 0;}
.user{margin-left:auto;background:#3b82f6;}
.bot{background:#333;}
.inputBar{padding:10px;border-top:1px solid #333;}
.inputBox{display:flex;gap:10px;background:#2a2a2a;padding:10px;border-radius:15px;}
input{flex:1;background:none;border:none;color:white;outline:none;}
button{cursor:pointer;}
.menu3{position:absolute;background:#2a2a2a;display:none;flex-direction:column;}
</style>
</head>

<body>

<div class="sidebar">

<div class="btn" onclick="newChat()">➕ New Chat</div>

<div class="yourChats" onclick="toggleChats()">
<span>Your Chats</span>
<span id="arrow">▼</span>
</div>

<div id="chatList"></div>

</div>

<div class="main">

<div class="topbar">
<div>StudyGenius AI</div>
<button onclick="toggleTheme()">🌗</button>
</div>

<div class="chat" id="chat"></div>

<div class="inputBar">
<div class="inputBox">
<input id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("chats")||"[]");
let current = null;

function save(){
  localStorage.setItem("chats",JSON.stringify(chats));
}

function renderChats(){
  chatList.innerHTML="";
  chats.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="chatItem";
    div.innerHTML=`
    <div class="left" onclick="openChat(${i})">
      <div class="dot"></div>
      <span>${c.name}</span>
    </div>
    <div onclick="menu(event,${i})">⋯</div>
    `;
    chatList.appendChild(div);
  });
}

function newChat(){
  let name="Chat "+(chats.length+1);
  chats.push({name, messages:[]});
  save();
  renderChats();
}

function openChat(i){
  current=i;
  chat.innerHTML="";
  chats[i].messages.forEach(m=>{
    let d=document.createElement("div");
    d.className="message "+m.role;
    d.innerText=m.text;
    chat.appendChild(d);
  });
}

function send(){
  let val=input.value.trim();
  if(!val || current===null) return;

  chats[current].messages.push({role:"user",text:val});
  chats[current].messages.push({role:"bot",text:"Thinking..."});
  save();
  openChat(current);

  input.value="";

  setTimeout(()=>{
    chats[current].messages.pop();
    chats[current].messages.push({role:"bot",text:"AI Response"});
    save();
    openChat(current);
  },800);
}

function toggleChats(){
  if(chatList.style.display==="none"){
    chatList.style.display="block";
    arrow.innerText="▼";
  }else{
    chatList.style.display="none";
    arrow.innerText="▶";
  }
}

function toggleTheme(){
  document.body.style.background=
  document.body.style.background=="white"?"#181818":"white";
}

renderChats();

</script>

</body>
</html>
