<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberStudy v1.0 | Gemini Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        :root {
            --bg-dark: #050509;
            --bg-panel: rgba(20, 20, 35, 0.7);
            --accent-neon: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--bg-panel); backdrop-filter: blur(10px); border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; padding: 30px 20px; }
        .brand { font-size: 24px; font-weight: 800; color: var(--accent-neon); letter-spacing: 2px; margin-bottom: 50px; }
        .nav-item { padding: 15px 20px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: var(--text-muted); transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 242, 254, 0.1); color: var(--accent-neon); }

        /* Main */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--border-glass); }
        .viewport { flex: 1; padding: 40px; overflow-y: auto; }
        
        .btn-upgrade { background: var(--accent-neon); color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">CYBERSTUDY</div>
        <div class="nav-links">
            <div class="nav-item active" onclick="loadView('dashboard')">📊 Dashboard</div>
            <div class="nav-item" onclick="loadView('exams')">📝 Mock Exams</div>
            <div class="nav-item" onclick="loadView('notes')">📓 Smart Notes</div>
            <div class="nav-item" onclick="loadView('pricing')">💎 Pricing</div>
            <div class="nav-item" onclick="loadView('auth')">🔑 Login</div>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <div style="color: var(--text-muted);">Status: <span style="color: var(--accent-neon);">Gemini AI Engine Online</span></div>
            <button class="btn-upgrade" onclick="loadView('pricing')">UPGRADE TO PRO</button>
        </header>
        <div class="viewport" id="viewport">
            </div>
    </main>

    <script>
        const VIEWS = {
            dashboard: `<h1>Welcome, Abhinav</h1><p style="color:var(--text-muted);margin-top:10px;">Your 3 Lakh/Month journey starts here.</p>
                        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:30px;">
                            <div style="background:var(--bg-panel);padding:20px;border-radius:15px;border:1px solid var(--border-glass);">
                                <h4>MONTHLY REVENUE</h4><h2 style="color:var(--accent-neon);">$0.00</h2>
                            </div>
                        </div>`,
            exams: `<h1>Mock Exams</h1><p>Start your high-ticket simulations.</p>`,
            notes: `<h1>Smart Notes</h1><p>AI-generated study material.</p>`,
            pricing: `<h1>Choose Your Plan</h1>
                      <div style="display:flex; gap:20px; margin-top:30px;">
                        <div style="background:var(--bg-panel);padding:30px;border-radius:20px;border:2px solid var(--accent-neon);width:300px;text-align:center;">
                            <h3>ELITE PRO</h3><h2 style="margin:15px 0;">$49/mo</h2><button class="btn-upgrade">GET STARTED</button>
                        </div>
                      </div>`,
            auth: `<h1>Login</h1><div style="margin-top:20px; max-width:300px;">
                   <input type="text" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border-glass);color:white;">
                   <button class="btn-upgrade" style="width:100%;">ENTER DASHBOARD</button></div>`
        };

        function loadView(viewName) {
            document.getElementById('viewport').innerHTML = VIEWS[viewName];
            // Update active state
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.toLowerCase().includes(viewName)) item.classList.add('active');
            });
        }

        // Initial Load
        loadView('dashboard');
    </script>
</body>
</html>
